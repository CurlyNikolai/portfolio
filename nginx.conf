server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header Referrer-Policy        "strict-origin"        always;
    add_header X-XSS-Protection       "1; mode=block"        always;

    # ── Caching ──────────────────────────────────────────────────────────
    # Astro fingerprints assets in _astro/ — cache them aggressively
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML pages should always revalidate
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # ── Routing ──────────────────────────────────────────────────────────
    # Try the exact file, then directory index, then fall back to 404 page.
    # Astro generates a proper 404.html — use it.
    location / {
        try_files $uri $uri/ $uri.html =404;
        error_page 404 /404.html;
    }
}
